name: Feature request
description: Propose a focused improvement
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is difficult or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired user-facing behavior without prescribing unnecessary implementation detail.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any current workaround or alternative design.
